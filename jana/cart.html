<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab of Joy - Cart</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

<div class="topbar">
<div class="brand"><span>Lab of Joy 🎁</span></div>
<div class="badge">Your gift box is waiting 💗</div>
</div>

<div class="grid">

<div class="card">
<h2 class="h-title">Your Cart</h2>
<p class="h-sub">Review your selected gifts before checkout.</p>

<div class="empty-cart">
<h3>Your cart is empty 🛒</h3>
<p>Start adding gifts to create your joyful box.</p>

<div class="btns">
<a href="Categories.html"   class="btn btn-primary">Start Shopping  </a>
</div>
</div>

</div>

<div class="card">

<h2 class="h-title">Summary</h2>
<p class="h-sub">Check your budget and total price.</p>

<div class="total-box">

<div class="total-line">
<span>Items</span>
<strong>0</strong>
</div>

<div class="total-line">
<span>Total</span>
<strong>0 SAR</strong>
</div>

<div class="total-line">
<span>Status</span>
<strong class="note-bad">Cart Empty</strong>
</div>

</div>


<nav class="btns">

<a href="checkout.html" class="btn btn-primary" style="width:100%">
  Proceed to Checkout
</a>
</nav>  






</div>

</div>

</div>

</body>
</html>
