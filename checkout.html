<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Checkout</h1>
<p>Almost There ✨</p>

<form action="order_success.html">

<h3>Delivery Information</h3>

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" placeholder="05xxxxxxxx" required>
</div>

<div class="form-group">
<label>City</label>
<input type="text" placeholder="Enter your city">
</div>

<h3>Saudi National Address</h3>

<div class="form-group">
<label>Building Number</label>
<input type="text" placeholder="1234">
</div>

<div class="form-group">
<label>Street Name</label>
<input type="text" placeholder="Street name">
</div>

<div class="form-group">
<label>District</label>
<input type="text" placeholder="District">
</div>

<div class="form-group">
<label>Postal Code</label>
<input type="text" placeholder="12345">
</div>

<div class="form-group">
<label>Additional Number</label>
<input type="text" placeholder="6789">
</div>



<nav class="btns">

<a href="order_success.html" class="btn btn-primary" style="width:100%">
  Place Order
</a>
</nav>  



</form>

</div>

</body>
</html>
