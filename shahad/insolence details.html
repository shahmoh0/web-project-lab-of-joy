<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Guerlain Insolence</title>
  <link rel="stylesheet" href="miss (1).css">
</head>
<body>

  <header class="Header">
    <h1 class="Title">Guerlain Insolence</h1>
    <p class="line">Elegant floral fragrance</p>
  </header>

  <main class="detailsContainer">

    <div class="productSection">

      <div class="productImages">
        <img src="image/guerlain-insolence.jpg" alt="Guerlain Insolence" class="mainImage">
      </div>

      <div class="productInfo">
        <h2>About the Fragrance</h2>
        <p>
          A soft and feminine floral perfume with a powdery and elegant scent.
        </p>

        <h2>Ingredients</h2>
        <ul>
          <li>Red berries</li>
          <li>Violet</li>
          <li>Orange blossom</li>
          <li>Iris</li>
        </ul>

        <h2>Size</h2>
        <p>75 ml</p>

        <h2>Price</h2>
        <p class="price">690 SAR</p>
      </div>

      <div class="cartCard">
        <h3>Add to Cart</h3>
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" min="1" max="10" value="1">
        <a href="#" class="cartBtn">Add to Cart</a>
      </div>

    </div>

  </main>

  <footer class="siteFooter">
    © Lab of Joy
  </footer>

</body>
</html>
