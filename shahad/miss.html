<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Miss Dior Blooming Bouquet</title>
  <link rel="stylesheet" href="miss (1).css">
</head>
<body>

<header class="Header">
  <h1 class="Title">Miss Dior Blooming Bouquet</h1>
  <p class="line">Fresh floral fragrance</p>
</header>

<main class="detailsContainer">

  <div class="productSection">

    <div class="productImages">
      <img src="image/miss dior.jpg" alt="Miss Dior Blooming Bouquet" class="mainImage">
    </div>

    <div class="productInfo">
      <h2>About the Fragrance</h2>
      <p>
        A delicate and fresh floral fragrance inspired by blooming flowers and soft femininity.
      </p>

      <h2>Ingredients</h2>
      <ul>
        <li>Peony</li>
        <li>Damask rose</li>
        <li>White musk</li>
        <li>Bergamot</li>
      </ul>

      <h2>Size</h2>
      <p>100 ml</p>

      <h2>Price</h2>
      <p class="price">715 SAR</p>
    </div>

    <div class="cartCard">
      <h3>Add to Cart</h3>
      <label for="quantity">Quantity</label>
      <input type="number" id="quantity" min="1" max="10" value="1">
      <a href="#" class="cartBtn">Add to Cart</a>
    </div>

  </div>

</main>

<footer class="siteFooter">
  © Lab of Joy
</footer>

</body>
</html>
