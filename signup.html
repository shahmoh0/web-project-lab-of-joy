<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab of Joy - Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

<div class="topbar">
<div class="brand"><span>Lab of Joy 🎁</span></div>
<div class="badge">Create your account 💗</div>
</div>

<div class="card form-card">

<h2 class="h-title">Sign Up</h2>
<p class="h-sub">Create your account in seconds.</p>

<form>

<div class="field">
<label>Full Name</label>
<input class="input" type="text" required>
</div>

<div class="row">

<div class="field">
<label>Email</label>
<input class="input" type="email" required>
</div>

<div class="field">
<label>Phone</label>
<input class="input" type="tel">
</div>

</div>

<div class="row">

<div class="field">
<label>Password</label>
<input class="input" type="password" required>
</div>

<div class="field">
<label>Confirm Password</label>
<input class="input" type="password" required>
</div>

</div>


<nav class="btns">
  <ul>
    <li>
      <a href="categories.html" class="btn btn-primary">Create Account</a>
    </li>
  </ul>
</nav>



<p style="margin-top:10px">
Already have an account?
<a class="link" href="login.html">Login</a>
</p>

</form>

</div>

</div>

</body>
</html>
